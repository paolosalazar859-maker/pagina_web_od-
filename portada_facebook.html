<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Portada Facebook | Optimizate Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent-main: #c13584;
            --accent-sec: #833ab4;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        /* Dimensiones exactas de portada de Facebook (Escritorio: 820x312) */
        .fb-cover {
            width: 820px;
            height: 312px;
            background-color: var(--bg-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            /* Patrón de fondo tecnológico */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.02) 1px, transparent 0),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 20px 20px;
        }

        /* Luces de neón en las esquinas */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.4;
        }

        .glow.left {
            background: var(--accent-main);
            top: -200px;
            left: -100px;
        }

        .glow.right {
            background: var(--accent-sec);
            bottom: -200px;
            right: -100px;
        }

        /* Contenido Central */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 10px rgba(193, 53, 132, 0.5));
        }

        .brand-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1;
        }

        .brand-text span {
            color: var(--accent-main);
        }

        .slogan {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ccc;
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .services {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        .service-badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
            border-bottom: 2px solid var(--accent-main);
            padding-bottom: 4px;
        }

        /* Controles */
        .controls {
            margin-top: 40px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-sec), var(--accent-main));
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Outfit';
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(193, 53, 132, 0.3);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(193, 53, 132, 0.5);
        }
    </style>
</head>
