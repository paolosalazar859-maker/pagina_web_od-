<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas Listas para Imprenta | Oficio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #ffffff; /* Fondo blanco para evitar que se vea plomo al imprimir */
            --accent-color: #c13584; /* Volvemos al magenta original, resalta perfecto en blanco */
            --text-color: #1a1a1a; /* Gris muy oscuro/casi negro para el texto */
            --card-width: 86mm;
            --card-height: 54mm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        body {
            background-color: #e0e0e0;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .no-print {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            background: #c13584;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Configuración de Página Oficio */
        .page {
            width: 216mm;
            height: 330mm;
            background: white;
            position: relative;
            margin-bottom: 20mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            page-break-after: always;
        }

        /* Grilla de Tarjetas (2 columnas x 5 filas) */
        .grid {
            display: grid;
            grid-template-columns: var(--card-width) var(--card-width);
            grid-template-rows: repeat(5, var(--card-height));
            gap: 0; /* Sin espacio para poder cortar por la misma línea */
            border: 0.5px solid #ccc; /* Línea de corte exterior */
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            border: 0.5px dashed #ccc; /* Líneas de corte guía */
            color: var(--text-color);
        }

        /* Diseño del Anverso */
        .front {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .front .logo {
            width: 40px;
            height: 40px;
            margin-bottom: 5px;
        }

        .front .brand {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .front .brand span {
            color: var(--accent-color);
        }

        .front .slogan {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            opacity: 0.85;
            margin-top: 5px;
        }

        /* Diseño del Reverso */
        .back {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            padding: 0;
        }

        .back .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            padding: 5mm;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .back .name {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .back .title {
            font-size: 10px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .back .contact-line {
            font-size: 11.5px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .back .qr-box {
            text-align: center;
            width: 35mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .back .qr {
            width: 18mm;
            height: 18mm;
            background: #ffffff;
            padding: 2.5px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .back .qr-text {
            font-size: 7.5px;
            color: #ffffff;
            text-transform: uppercase;
            margin-top: 6px;
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        /* Formas orgánicas premium */
        .shape-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 34mm;
            background: linear-gradient(135deg, var(--accent-color), #ff6bbd);
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
            z-index: 0;
        }
        .glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(193, 53, 132, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .page { box-shadow: none; margin: 0; }
            @page { size: 216mm 330mm; margin: 0; }
        }
    </style>
</head>
<body>

        <p>10 tarjetas por hoja. Tamaño Tarjeta de Crédito: 8.6x5.4 cm (86x54mm).</p>
        <p style="font-size: 13px; color: #666; margin-top: 5px;">
            Asegúrate de configurar la impresión al <strong>100% de escala</strong> y activar <strong>"Gráficos de fondo"</strong>.
        </p>
        <button class="btn" onclick="window.print()">Imprimir / Guardar como PDF</button>

</body>
</html>
